<div class="login-card">
    <h2>Welcome to Planora
    </h2>
    <p class="subtitle">
        Log in to manage your task and stay organized.
    </p>
    <form (ngSubmit)="Login()">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter your Email Address">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your Password">
        </div>

        <button type="submit" class="login-btn">
            Submit
        </button>
    </form>

    <p class="message">
        {{message}}
    </p>
    <p class="register-text">
        Don't have an account?
        <a href="/register" class="link">
        Create Account
    </a>
    </p>
    
</div>
