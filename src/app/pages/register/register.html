<h2>Register Form</h2>
<form (ngSubmit)="register()">
<input 
    type="text"
    [(ngModel)]="name"
    name = "name"
    placeholder="name"
/>
<br><br>

<input 
    type="email"
    [(ngModel)]="email"
    name = "email"
    placeholder="email"
/>
<br><br>

<input 
    type="password"
    [(ngModel)]="password"
    name="password"
    placeholder="password"
/>
<input type="submit">
</form>
<br><br>
<p>{{message}}</p>
