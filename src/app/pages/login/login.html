<h2>Login Form</h2>
<form (ngSubmit)="Login()">

<input 
    type="email"
    [(ngModel)]="email"
    name = "email"
    placeholder="email"
/>
<br><br>

<input 
    type="password"
    [(ngModel)]="password"
    name="password"
    placeholder="password"
/>
<input type="submit">

</form>

<br><br>

<button (click)="getProfile()">Get Profile</button>
<p>{{message}}</p>
